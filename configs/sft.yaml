# SFT Configuration for GTX 1080 (8GB VRAM)
# Usage: python scripts/train_sft.py (reads defaults, or pass args)

# Data
data_dir: data/processed
max_length: 128

# Model
model_name: gpt2          # 124M params
from_scratch: true         # Random init (SELFIES ≠ English)

# Training
epochs: 10
batch_size: 32             # Reduce to 16 if OOM
lr: 5.0e-4
warmup_ratio: 0.05
weight_decay: 0.01

# Memory optimization (for 8GB GPU)
fp16: true
gradient_checkpointing: true

# Evaluation
eval_every: 1
generate_every: 2
n_generate: 500

# Output
output_dir: checkpoints/sft
wandb_project: null        # Set to "mol-rl" to enable

seed: 42
